<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music 2018</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
}

.song {
    padding: 15px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}

.song:hover {
    background: #1db954;
}

.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #181818;
    padding: 10px;
    text-align: center;
}
</style>
</head>

<body>

<h1>🎧 ТОП 2018</h1>

<div class="song" onclick="play(Mp3)
</div>

<div class="song" onclick="play(MP3)
</div>

<div class="song" onclick="play(MP3)
</div>

<div class="player">
<audio id="player" controls></audio>
</div>

<script>
function play(src) {
    var player = document.getElementById("player");
    player.src = src;
    player.play();
}
</script>

</body>
</html>
