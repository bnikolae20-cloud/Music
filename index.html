<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Музыка</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    background: #1db954;
}

.container {
    padding: 20px;
}

.artist {
    margin-bottom: 30px;
}

h2 {
    color: #1db954;
}

.song {
    padding: 10px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}

.song:hover {
    background: #222;
}

.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #181818;
    padding: 10px;
    text-align: center;
}

iframe {
    width: 100%;
    height: 80px;
}
</style>
</head>

<body>

<header>🎵 Музыкальный сайт</header>

<div class="container">

<div class="artist">
<h2>Моргенштерн</h2>
<div class="song" onclick="play('https://www.youtube.com/embed/5kQY2a3x6sA')">Cadillac</div>
<div class="song" onclick="play('https://www.youtube.com/embed/k5mX3NkA7jM')">El Problema</div>
</div>

<div class="artist">
<h2>Нурминский</h2>
<div class="song" onclick="play('https://www.youtube.com/embed/1x4Zp5hP5k0')">Валим</div>
</div>

<div class="artist">
<h2>Слава Марвел</h2>
<div class="song" onclick="play('https://www.youtube.com/embed/dQw4w9WgXcQ')">Трек 1</div>
</div>

</div>

<div class="player">
<iframe id="player" src="" frameborder="0" allow="autoplay"></iframe>
</div>

<script>
function play(url) {
    document.getElementById('player').src = url + "?autoplay=1";
}
</script>

</body>
</html>
